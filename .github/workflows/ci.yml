name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Set up mock HMD data
        run: |
          mkdir -p backend/data/hmd/usa backend/data/hmd/spain
          cp backend/data/mock/hmd/usa/* backend/data/hmd/usa/
          cp backend/data/mock/hmd/spain/* backend/data/hmd/spain/

      - name: Run unit tests
        run: pytest backend/tests/ -v --tb=short

      - name: Run API tests
        run: pytest backend/tests/test_api/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
