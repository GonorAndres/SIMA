name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: sima
  IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/sima/sima

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/451451662791/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@project-ad7a5be2-a1c7-4510-82d.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Download real data from GCS
        run: |
          mkdir -p backend/data/inegi backend/data/conapo backend/data/hmd/usa backend/data/hmd/spain
          gsutil -m cp gs://sima-mortality-data/inegi/inegi_deaths.csv backend/data/inegi/
          gsutil -m cp gs://sima-mortality-data/conapo/conapo_population.csv backend/data/conapo/
          gsutil -m cp gs://sima-mortality-data/hmd/usa/*.txt backend/data/hmd/usa/
          gsutil -m cp gs://sima-mortality-data/hmd/spain/*.txt backend/data/hmd/spain/

      - name: Verify downloaded data files
        run: |
          echo "=== Checking INEGI ==="
          test -f backend/data/inegi/inegi_deaths.csv || { echo "MISSING: inegi_deaths.csv"; exit 1; }
          echo "=== Checking CONAPO ==="
          test -f backend/data/conapo/conapo_population.csv || { echo "MISSING: conapo_population.csv"; exit 1; }
          echo "=== Checking HMD USA ==="
          test -f backend/data/hmd/usa/Mx_1x1_usa.txt || { echo "MISSING: HMD USA Mx"; exit 1; }
          echo "=== Checking HMD Spain ==="
          test -f backend/data/hmd/spain/Mx_1x1_spain.txt || { echo "MISSING: HMD Spain Mx"; exit 1; }
          echo "=== Checking CNSF (from git) ==="
          test -f backend/data/cnsf/cnsf_2000_i.csv || { echo "MISSING: cnsf_2000_i.csv"; exit 1; }
          test -f backend/data/cnsf/emssa_2009.csv || { echo "MISSING: emssa_2009.csv"; exit 1; }
          echo "All required data files present."

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 2

      - name: Validate production (actuarial + data source)
        run: |
          sleep 30
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Service URL: $SERVICE_URL"
          python3 scripts/validate_production.py "$SERVICE_URL"
